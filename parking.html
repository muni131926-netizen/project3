<!DOCTYPE html>
<html>
<head>
    <title>Parking - Smart Parking Center</title>

    <style>
        body {
            font-family: Arial;
            margin: 0;

            background: url("https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcTAAy_gmcjIMonsQA0NlYSvPCjuBISKIorAOQ&s");
            background-size: cover;
            background-position: center;
        }

        /* overlay for readability */
        body::before {
            content: "";
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.55);
            z-index: 0;
        }

        .top-bar {
            position: relative;
            z-index: 1;
            display: flex;
            justify-content: space-between;
            padding: 12px;
            align-items: center;
            background: rgba(0,0,0,0.7);
            color: white;
            font-size: 18px;
        }

        .container {
            position: relative;
            z-index: 1;
            display: flex;
            justify-content: center;
            gap: 120px;
            margin-top: 30px;
        }

        .column {
            display: grid;
            grid-template-columns: repeat(2, 120px);
            grid-auto-rows: 85px;
            gap: 15px;
        }

        .car {
            width: 120px;
            height: 75px;
            border-radius: 15px;
            cursor: pointer;
            display: flex;
            justify-content: center;
            align-items: center;
            color: white;
            font-weight: bold;
            font-size: 18px;
            user-select: none;
        }

        .empty { background: #2ecc71; }
        .process { background: #f39c12; }
        .booked { background: #e74c3c; }

        #popup {
            display: none;
            position: fixed;
            top: 20%;
            right: 5%;
            background: white;
            padding: 20px;
            border: 2px solid black;
            width: 250px;
            z-index: 2;
        }

        .bottom-bar {
            position: fixed;
            bottom: 20px;
            width: 100%;
            text-align: center;
            z-index: 1;
        }

        button {
            cursor: pointer;
            font-size: 16px;
        }
    </style>
</head>

<body>

<div class="top-bar">
    <div>SMART PARKING CENTER</div>
    <button onclick="showBookings()">View Bookings</button>
</div>

<div class="container">
    <div class="column" id="left"></div>
    <div class="column" id="right"></div>
</div>

<div style="text-align:center; margin-top:20px; position:relative; z-index:1;">
    <button onclick="confirmBooking()" style="padding:12px 20px;">
        OK / Confirm
    </button>
</div>

<div id="popup"></div>

<div class="bottom-bar">
    <button onclick="logout()" style="padding:12px 20px; background:black; color:white;">
        Logout
    </button>
</div>

<script src="script.js"></script>

</body>
</html>
