<!DOCTYPE html>
<html>
<head>
    <title>Login - Smart Parking Center</title>

    <style>
        body {
            margin: 0;
            font-family: Arial;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;

            background: url("https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcTAAy_gmcjIMonsQA0NlYSvPCjuBISKIorAOQ&s");
            background-size: cover;
            background-position: center;
        }

        /* dark overlay to stop image interference */
        body::before {
            content: "";
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.55);
            z-index: 0;
        }

        .container {
            position: relative;
            z-index: 1;
            text-align: center;
        }

        .brand-outside {
            font-size: 28px;
            font-weight: bold;
            color: white;
            margin-bottom: 20px;
            letter-spacing: 2px;
        }

        .box {
            background: rgba(255,255,255,0.95);
            padding: 35px;
            width: 340px;
            border-radius: 15px;
            box-shadow: 0px 10px 25px rgba(0,0,0,0.5);
            text-align: center;
        }

        h1 {
            font-size: 24px;
            margin-bottom: 20px;
        }

        input {
            width: 92%;
            padding: 12px;
            margin: 12px 0;
            border-radius: 8px;
            border: 1px solid #ccc;
            font-size: 16px;
        }

        button {
            width: 96%;
            padding: 12px;
            margin-top: 10px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-weight: bold;
            font-size: 16px;
        }

        .register { background: #3498db; color: white; }
        .login { background: #2ecc71; color: white; }

        #msg {
            margin-top: 10px;
            color: red;
            font-size: 14px;
        }
    </style>
</head>

<body>

<div class="container">

    <!-- OUTSIDE BOX BRAND NAME -->
    <div class="brand-outside">SMART PARKING CENTER</div>

    <div class="box">
        <h1>Login</h1>

        <input id="username" placeholder="Username">
        <input id="password" type="password" placeholder="Password">

        <button class="register" onclick="register()">Register</button>
        <button class="login" onclick="login()">Login</button>

        <p id="msg"></p>
    </div>

</div>

<script>
function register() {
    const username = document.getElementById("username").value
    const password = document.getElementById("password").value

    fetch("http://localhost:3000/register", {
        method: "POST",
        headers: {"Content-Type":"application/json"},
        body: JSON.stringify({username, password})
    })
    .then(res => res.text())
    .then(data => alert(data))
}

function login() {
    const username = document.getElementById("username").value
    const password = document.getElementById("password").value

    fetch("http://localhost:3000/login", {
        method: "POST",
        headers: {"Content-Type":"application/json"},
        body: JSON.stringify({username, password})
    })
    .then(res => res.json())
    .then(data => {
        if(data.token){
            localStorage.setItem("token", data.token)
            localStorage.setItem("user", username)
            window.location.href="parking.html"
        } else {
            document.getElementById("msg").innerText="Login Failed"
        }
    })
}
</script>

</body>
</html>
